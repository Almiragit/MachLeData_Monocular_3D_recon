# configs/train.yaml
# ------------------
# Experiment configuration for DaV2 Hybrid fine-tuning pipeline.

experiment:
  name: "dav2-vitb-inference"
  project: "monocular-3d-recon"
  tags: ["dav2", "vitb", "hybrid", "finetune"]
  notes: "Depth-Anything-V2 ViT-B with frozen DINOv2 + trainable DPTHead decoder"

model:
  architecture: "dav2_vitb"      # dav2_vits | dav2_vitb | dav2_vitl
  encoder: "vitb"                # matches architecture suffix
  input_size: 518                # DaV2 default inference size
  checkpoint_dir: "src/models/Depth-Anything-V2/checkpoints"

training:
  epochs: 10
  batch_size: 4
  learning_rate: 0.0001
  freeze_encoder: true           # DINOv2 frozen, only DPTHead trains
  num_workers: 0

inference:
  batch_size: 1                  # DaV2 runs image-by-image (infer_image API)
  num_workers: 4
  save_depth_maps: true
  save_coloured_depth: true
  save_point_clouds: true
  point_cloud_subsample: 1

evaluation:
  depth_metrics: true            # now uses GT depth from NYU
  log_n_sample_images: 8

logging:
  log_dir: "artifacts/logs"
  csv_log: "artifacts/logs/inference_log.csv"
  plots_dir: "artifacts/plots"
  log_every_n_steps: 10
name: CI Pipeline

on:
  push:
    branches: [ dev ]  # runs on dev only
  pull_request:
    branches: [ dev ]  # runs on pull to dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
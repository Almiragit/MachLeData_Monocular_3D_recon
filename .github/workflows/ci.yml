name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint & Import Checks
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install flake8 pyyaml

      - name: Flake8
        run: |
          flake8 src/ app/ \
            --max-line-length=100 \
            --ignore=E501,W503,E203 \
            --exclude=src/models/Depth-Anything-V2

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml, sys
          for f in ['configs/paths.yaml', 'configs/train.yaml', 'dvc.yaml']:
              try:
                  yaml.safe_load(open(f))
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'FAIL: {f} — {e}')
                  sys.exit(1)
          "

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Unit Tests (pytest)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install pytest pyyaml numpy scipy prometheus-client opencv-python torch

      - name: Run tests
        run: pytest tests/ -v

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: DVC Pipeline (sanity check)
  # Runs DVC stages that don't require real data or GPU
  # ─────────────────────────────────────────────────────────────────────────────
  dvc-check:
    name: DVC Pipeline Check
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install DVC
        run: pip install dvc pyyaml numpy

      - name: Check DVC dag
        run: dvc dag

      - name: Validate pipeline syntax
        run: |
          python -c "
          import yaml
          with open('dvc.yaml') as f:
              stages = yaml.safe_load(f)['stages']
          print(f'Pipeline has {len(stages)} stages:')
          for name in stages:
              print(f'  - {name}')
          "

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Build & Push Docker Image (only on main)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/monocular-3d-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
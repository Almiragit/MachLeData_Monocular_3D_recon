name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint & Import Checks
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install flake8 pyyaml

      - name: Flake8
        run: |
          flake8 src/ app/ \
            --max-line-length=100 \
            --ignore=E501,W503,E203 \
            --per-file-ignores="src/training/train.py:E402,src/training/evaluate.py:E402,src/monitoring/compute_baseline.py:E402" \
            --exclude=src/models/Depth-Anything-V2

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml, sys
          for f in ['configs/paths.yaml', 'configs/train.yaml', 'dvc.yaml']:
              try:
                  yaml.safe_load(open(f))
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'FAIL: {f} — {e}')
                  sys.exit(1)
          "

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Unit Tests (pytest)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install pytest pyyaml numpy scipy prometheus-client opencv-python torch pillow requests fastapi uvicorn httpx python-multipart

      - name: Run tests
        run: pytest tests/ -v

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: DVC Pipeline (sanity check)
  # Runs DVC stages that don't require real data or GPU
  # ─────────────────────────────────────────────────────────────────────────────
  dvc-check:
    name: DVC Pipeline Check
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install DVC
        run: pip install dvc pyyaml numpy

      - name: Check DVC dag
        run: dvc dag

      - name: Validate pipeline syntax
        run: |
          python -c "
          import yaml
          with open('dvc.yaml') as f:
              stages = yaml.safe_load(f)['stages']
          print(f'Pipeline has {len(stages)} stages:')
          for name in stages:
              print(f'  - {name}')
          "

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Docker E2E Smoke Test (free disk first)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-e2e-smoke:
    name: Docker E2E Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Build and start services
        run: docker compose up -d --build api prometheus

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /tmp/health.json; then
              echo "API healthy"
              cat /tmp/health.json
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 5
          done
          echo "API did not become healthy in time"
          docker compose logs --tail=200 api
          exit 1

      - name: Smoke /predict/json and /metrics
        run: |
          python -m pip install --upgrade pip pillow

          python - <<'PY'
          from PIL import Image
          img = Image.new("RGB", (64, 64), color=(120, 80, 40))
          img.save("smoke.png")
          print("Created smoke.png")
          PY

          curl -fsS -X POST "http://localhost:8000/predict/json" \
            -F "file=@smoke.png;type=image/png" > /tmp/predict.json

          python - <<'PY'
          import json
          with open('/tmp/predict.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          required = ['depth_colormap_b64', 'depth_gray_b64', 'point_cloud', 'inference_ms']
          missing = [k for k in required if k not in data]
          if missing:
              raise SystemExit(f"Missing keys in /predict/json response: {missing}")
          print("/predict/json response keys OK")
          PY

          curl -fsS http://localhost:8000/metrics | grep -E "drift_alert_triggered|process_start_time_seconds|python_info" >/dev/null
          echo "/metrics smoke OK"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --tail=300 api prometheus

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
          docker builder prune -af

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 5: Build & Push Docker Image (only on main, free disk first)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, docker-e2e-smoke]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/monocular-3d-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (main) | Build only (dev)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/monocular-3d-api

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint & basic import checks
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Import Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint deps
        run: pip install flake8 pyyaml

      - name: Flake8
        run: |
          flake8 src/ app/ \
            --max-line-length=100 \
            --ignore=E501,W503,E203 \
            --exclude=src/models/Depth-Anything-V2

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml, sys
          for f in ['configs/paths.yaml', 'configs/train.yaml', 'dvc.yaml']:
              try:
                  yaml.safe_load(open(f))
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'FAIL: {f} — {e}')
                  sys.exit(1)
          "

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Sanity inference run (debug mode — no real data needed)
  # Only runs on push to main or manual trigger
  # ─────────────────────────────────────────────────────────────────────────────
  sanity-inference:
    name: Sanity Inference (debug)
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls Depth-Anything-V2 if added as submodule

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install only what's needed for sanity check (skip heavy deps)
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install wandb pyyaml numpy pillow opencv-python-headless open3d

      - name: Login to W&B
        run: wandb login ${{ secrets.WANDB_API_KEY }}

      - name: Run sanity inference (debug=5 images)
        run: |
          python src/training/train.py --debug --split val
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        continue-on-error: true   # don't block CI if no real data on runner

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Push model outputs to W&B Registry (only on main)
  # ─────────────────────────────────────────────────────────────────────────────
  push-registry:
    name: Push to W&B Registry
    runs-on: ubuntu-latest
    needs: sanity-inference
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install wandb pyyaml

      - name: Push model artifact
        run: python src/registry/push_model.py
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Build & push Docker image
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
